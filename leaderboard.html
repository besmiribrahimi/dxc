<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ascend Entrenched | Leaderboard</title>
  <meta name="description" content="Ascend Entrenched Player Leaderboard">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preload" as="image" href="assets/brand/logo-mark-512.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-glow" aria-hidden="true"></div>

  <header class="hero">
    <a class="site-corner-brand" href="index.html" aria-label="Ascend Entrenched home">
      <img src="assets/brand/logo-mark-512.png" alt="Ascend Entrenched logo" width="56" height="56" decoding="async" fetchpriority="high">
    </a>
    <h1>Ascend Entrenched</h1>
    <p>Player Leaderboard</p>
    <nav class="site-nav" aria-label="Primary navigation">
      <a class="nav-link" href="index.html">Player Showcase</a>
      <a class="nav-link active" href="leaderboard.html">Leaderboard</a>
      <a class="nav-link" href="war-room.html">War Room</a>
    </nav>
  </header>

  <main class="leaderboard-content">
    <p id="leaderboardStatus" class="leaderboard-status">Loading leaderboard...</p>

    <div class="leaderboard-warroom-link">
      <a class="leaderboard-button" href="war-room.html">Open ENTRENCHED WW1 War Room</a>
    </div>

    <section class="leaderboard-top-three" id="leaderTopThree" aria-label="Top 3 Players"></section>

    <section class="leaderboard-panel" aria-label="Full leaderboard ranking">
      <div class="leaderboard-header">
        <span>Rank</span>
        <span>Player</span>
        <span>Faction</span>
        <span>Country</span>
        <span>K/D</span>
        <span>Level</span>
      </div>
      <div id="leaderboardRows"></div>
    </section>
  </main>

  <div id="playerModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Player details">
    <div class="modal-panel" role="document">
      <button type="button" id="closeModal" class="modal-close" aria-label="Close Player popup">Close</button>

      <div class="modal-left">
        <img id="modalAvatar" src="" alt="Player avatar">
      </div>

      <div class="modal-right">
        <h2 id="modalName">Player</h2>
        <div class="meta-row">
          <span>Faction</span>
          <strong id="modalFaction">N/A</strong>
        </div>
        <div class="meta-row">
          <span>Country</span>
          <strong id="modalCountry">N/A</strong>
        </div>
        <div class="modal-stats">
          <div class="modal-stat-box">
            <span>Level</span>
            <strong id="modalWins">0</strong>
          </div>
          <div class="modal-stat-box">
            <span>K/D</span>
            <strong id="modalKd">0.0</strong>
          </div>
        </div>
        <a id="modalDiscord" class="discord-button" href="https://discord.com" target="_blank" rel="noreferrer noopener">Open Player Discord</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="leaderboard.js"></script>
</body>
</html>
