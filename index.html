<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ascend Entrenched | Player Showcase</title>
  <meta name="description" content="Ascend Entrenched Player Showcase">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preload" as="image" href="assets/brand/logo-mark-512.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-glow" aria-hidden="true"></div>

  <header class="hero">
    <a class="site-corner-brand" href="index.html" aria-label="Ascend Entrenched home">
      <img src="assets/brand/logo-mark-512.png" alt="Ascend Entrenched logo" width="56" height="56" decoding="async" fetchpriority="high">
    </a>
    <h1>Ascend Entrenched</h1>
    <p>Player Showcase</p>
    <nav class="site-nav" aria-label="Primary navigation">
      <a class="nav-link active" href="index.html">Player Showcase</a>
      <a class="nav-link" href="leaderboard.html">Leaderboard</a>
      <a class="nav-link" href="war-room.html">War Room</a>
    </nav>
  </header>

  <main class="content">
    <section class="leaderboard-highlight" aria-label="Top Player Leaderboard">
      <article id="topPlayerCard" class="top-player-card" role="button" tabindex="0" aria-label="Open top Player profile">
        <div class="top-player-overlay"></div>

        <div class="top-player-left">
          <span class="top-player-label">Leaderboard</span>
          <div id="topFactionBadge" class="top-faction-badge">Faction</div>
          <h2 id="topPlayerName">Player</h2>
          <p id="topPlayerSubtitle">Top performance across recent matches.</p>

          <div class="top-player-stats">
            <div class="top-stat-card">
              <span>Wins</span>
              <strong id="topPlayerWins">0</strong>
            </div>
            <div class="top-stat-card">
              <span>K/D</span>
              <strong id="topPlayerKd">0.0</strong>
            </div>
          </div>
        </div>

        <div class="top-player-right">
          <div id="topCountryBadge" class="country-badge">Country</div>
          <div class="top-avatar-wrap">
            <img id="topPlayerAvatar" src="" alt="Top Player avatar">
          </div>
        </div>
      </article>
      <div class="leaderboard-cta">
        <a class="leaderboard-button" href="leaderboard.html">Open Full Leaderboard</a>
      </div>
    </section>

    <section class="players-section" aria-label="Players">
      <div id="playersGrid" class="players-grid"></div>
    </section>
  </main>

  <div id="playerModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Player details">
    <div class="modal-panel" role="document">
      <button type="button" id="closeModal" class="modal-close" aria-label="Close Player popup">Close</button>

      <div class="modal-left">
        <img id="modalAvatar" src="" alt="Player avatar">
      </div>

      <div class="modal-right">
        <h2 id="modalName">Player</h2>
        <div class="meta-row">
          <span>Faction</span>
          <strong id="modalFaction">N/A</strong>
        </div>
        <div class="meta-row">
          <span>Country</span>
          <strong id="modalCountry">N/A</strong>
        </div>
        <div class="modal-stats">
          <div class="modal-stat-box">
            <span>Wins</span>
            <strong id="modalWins">0</strong>
          </div>
          <div class="modal-stat-box">
            <span>K/D</span>
            <strong id="modalKd">0.0</strong>
          </div>
        </div>
        <a id="modalDiscord" class="discord-button" href="https://discord.com" target="_blank" rel="noreferrer noopener">Open Player Discord</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
